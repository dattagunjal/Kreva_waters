# Server
server.port=8080

# Database - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/mineral_water_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=June@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.mineralwater=DEBUG

# Meta WhatsApp Cloud API
whatsapp.access.token=PLACEHOLDER_TOKEN
whatsapp.phone.number.id=PLACEHOLDER_PHONE_NUMBER_ID
whatsapp.template.name=order_notification
# Multiple admin mobile numbers, comma-separated
admin.mobiles=8390252489,9307254107

# OTP configuration
otp.expiry.minutes=10
# Set to true in production to send real SMS/Email OTPs
# Set to false in dev — OTP is printed to console and returned in response header X-Dev-OTP
otp.mock.enabled=${OTP_MOCK_ENABLED:true}

# SMS Configuration
sms.api.key=${SMS_API_KEY:}

# Brevo Email Configuration
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:info@ugamwaters.in}

# Stripe Configuration
stripe.publishable.key=pk_test_PLACEHOLDER
stripe.secret.key=sk_test_PLACEHOLDER
stripe.webhook.secret=whsec_PLACEHOLDER
